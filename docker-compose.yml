version: '3.8'

services:
  # ── Raft Cluster Nodes ──
  node-1:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: minidb-node-1
    environment:
      - NODE_ID=node-1
      - CLUSTER_PEERS=node-2:9090,node-3:9090
      - STORAGE_PATH=/app/data/rocksdb
      - SERVER_PORT=8080
      - GRPC_SERVER_PORT=9090
    volumes:
      - node1-data:/app/data
    ports:
      - "8081:8080"
      - "9091:9090"
    networks:
      - minidb-net
    restart: unless-stopped

  node-2:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: minidb-node-2
    environment:
      - NODE_ID=node-2
      - CLUSTER_PEERS=node-1:9090,node-3:9090
      - STORAGE_PATH=/app/data/rocksdb
      - SERVER_PORT=8080
      - GRPC_SERVER_PORT=9090
    volumes:
      - node2-data:/app/data
    ports:
      - "8082:8080"
      - "9092:9090"
    networks:
      - minidb-net
    restart: unless-stopped

  node-3:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: minidb-node-3
    environment:
      - NODE_ID=node-3
      - CLUSTER_PEERS=node-1:9090,node-2:9090
      - STORAGE_PATH=/app/data/rocksdb
      - SERVER_PORT=8080
      - GRPC_SERVER_PORT=9090
    volumes:
      - node3-data:/app/data
    ports:
      - "8083:8080"
      - "9093:9090"
    networks:
      - minidb-net
    restart: unless-stopped

  # ── Frontend Dashboard ──
  ui:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: minidb-ui
    ports:
      - "3000:80"
    depends_on:
      - node-1
      - node-2
      - node-3
    networks:
      - minidb-net
    restart: unless-stopped

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:latest
    container_name: minidb-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - minidb-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped

  # ── Grafana ──
  grafana:
    image: grafana/grafana:latest
    container_name: minidb-grafana
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=minidb
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/minidb.json
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - minidb-net
    restart: unless-stopped

volumes:
  node1-data:
  node2-data:
  node3-data:
  prometheus-data:
  grafana-data:

networks:
  minidb-net:
    driver: bridge
