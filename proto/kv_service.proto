syntax = "proto3";

package minidb;

option java_multiple_files = true;
option java_package = "com.minidb.proto";
option java_outer_classname = "KvServiceProto";

// Key-Value Service API
service KvService {
  // Store a key-value pair
  rpc Put(PutRequest) returns (PutResponse);
  // Retrieve a value by key
  rpc Get(GetRequest) returns (GetResponse);
  // Consistent (linearizable) read
  rpc ConsistentGet(GetRequest) returns (GetResponse);
  // Delete a key (tombstone)
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  // Range scan
  rpc Scan(ScanRequest) returns (ScanResponse);

  // ---- Speculative MVCC Consensus (Novel) ----
  // Speculative put: writes immediately, returns before consensus
  rpc SpeculativePut(SpeculativePutRequest) returns (SpeculativePutResponse);
  // Speculative delete: writes tombstone immediately, returns before consensus
  rpc SpeculativeDelete(SpeculativeDeleteRequest) returns (SpeculativePutResponse);
}

message PutRequest {
  string key = 1;
  bytes value = 2;
  string txn_id = 3; // optional, for 2PC transactions
}

message PutResponse {
  bool success = 1;
  string error = 2;
  int64 timestamp = 3;
}

message GetRequest {
  string key = 1;
  int64 timestamp = 2; // 0 means latest
}

message GetResponse {
  bool found = 1;
  bytes value = 2;
  int64 timestamp = 3;
  string error = 4;
}

message DeleteRequest {
  string key = 1;
  string txn_id = 2;
}

message DeleteResponse {
  bool success = 1;
  string error = 2;
}

message ScanRequest {
  string start_key = 1;
  string end_key = 2;
  int32 limit = 3;
  int64 timestamp = 4; // 0 means latest
}

message ScanResponse {
  repeated KvPair pairs = 1;
  string error = 2;
}

message KvPair {
  string key = 1;
  bytes value = 2;
  int64 timestamp = 3;
}

// ---- Speculative MVCC Consensus Messages ----

message SpeculativePutRequest {
  string key = 1;
  bytes value = 2;
}

message SpeculativeDeleteRequest {
  string key = 1;
}

message SpeculativePutResponse {
  bool success = 1;
  bool speculative = 2;        // true if write is speculative (not yet committed)
  int64 timestamp = 3;          // MVCC timestamp of the speculative version
  int64 raft_log_index = 4;     // Raft log index for commit tracking
  double write_latency_ms = 5;  // Local write latency in milliseconds
  string error = 6;
}
