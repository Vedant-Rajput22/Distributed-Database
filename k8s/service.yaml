apiVersion: v1
kind: Namespace
metadata:
  name: minidb
---
# Headless Service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: minidb-headless
  namespace: minidb
  labels:
    app: minidb
spec:
  clusterIP: None
  selector:
    app: minidb
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 9090
      targetPort: 9090
---
# Client-facing Service (load-balanced)
apiVersion: v1
kind: Service
metadata:
  name: minidb-client
  namespace: minidb
  labels:
    app: minidb
spec:
  type: ClusterIP
  selector:
    app: minidb
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 9090
      targetPort: 9090
