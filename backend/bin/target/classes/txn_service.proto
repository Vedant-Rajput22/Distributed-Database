syntax = "proto3";

package minidb;

option java_multiple_files = true;
option java_package = "com.minidb.proto";
option java_outer_classname = "TxnServiceProto";

// Two-Phase Commit Transaction Service
service TxnService {
  rpc Prepare(PrepareRequest) returns (PrepareResponse);
  rpc Commit(CommitRequest) returns (CommitResponse);
  rpc Abort(AbortRequest) returns (AbortResponse);
  rpc GetTxnStatus(TxnStatusRequest) returns (TxnStatusResponse);
}

message PrepareRequest {
  string txn_id = 1;
  repeated TxnOperation operations = 2;
}

message TxnOperation {
  string key = 1;
  bytes value = 2;
  TxnOpType op_type = 3;
}

enum TxnOpType {
  TXN_PUT = 0;
  TXN_DELETE = 1;
}

message PrepareResponse {
  bool prepared = 1;
  string error = 2;
}

message CommitRequest {
  string txn_id = 1;
}

message CommitResponse {
  bool success = 1;
  string error = 2;
}

message AbortRequest {
  string txn_id = 1;
}

message AbortResponse {
  bool success = 1;
  string error = 2;
}

message TxnStatusRequest {
  string txn_id = 1;
}

message TxnStatusResponse {
  TxnStatus status = 1;
}

enum TxnStatus {
  TXN_UNKNOWN = 0;
  TXN_PENDING = 1;
  TXN_PREPARED = 2;
  TXN_COMMITTED = 3;
  TXN_ABORTED = 4;
}
